<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Black circle background -->
  <circle cx="30" cy="30" r="29" fill="#1c1c1c"/>
  <!-- Gold accent ring -->
  <circle cx="30" cy="30" r="29" fill="none" stroke="#FFB800" stroke-width="2"/>

  <!-- Bridge silhouette (simplified suspension bridge) -->
  <!-- Road/deck -->
  <line x1="6" y1="38" x2="54" y2="38" stroke="#FFB800" stroke-width="2" stroke-linecap="round"/>
  <!-- Left tower -->
  <line x1="18" y1="18" x2="18" y2="42" stroke="#FFB800" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right tower -->
  <line x1="42" y1="18" x2="42" y2="42" stroke="#FFB800" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Main cable left arc -->
  <path d="M6,38 Q18,22 30,28 Q42,22 54,38" fill="none" stroke="#FFB800" stroke-width="1.8"/>
  <!-- Vertical suspenders -->
  <line x1="12" y1="35" x2="12" y2="38" stroke="#FFB800" stroke-width="1" opacity="0.7"/>
  <line x1="20" y1="29" x2="20" y2="38" stroke="#FFB800" stroke-width="1" opacity="0.7"/>
  <line x1="26" y1="28" x2="26" y2="38" stroke="#FFB800" stroke-width="1" opacity="0.7"/>
  <line x1="34" y1="28" x2="34" y2="38" stroke="#FFB800" stroke-width="1" opacity="0.7"/>
  <line x1="40" y1="29" x2="40" y2="38" stroke="#FFB800" stroke-width="1" opacity="0.7"/>
  <line x1="48" y1="35" x2="48" y2="38" stroke="#FFB800" stroke-width="1" opacity="0.7"/>
  <!-- Tower crossbeams -->
  <line x1="15" y1="26" x2="21" y2="26" stroke="#FFB800" stroke-width="1.5"/>
  <line x1="39" y1="26" x2="45" y2="26" stroke="#FFB800" stroke-width="1.5"/>
</svg>
